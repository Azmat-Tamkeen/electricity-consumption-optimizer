<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltWise - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='language.js') }}"></script>
    <script>
        window.addEventListener("load", function(){
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
    </script>
</head>
<body style="display:flex; flex-direction: column; justify-content:center; align-items:center; min-height:100vh; padding: 20px; box-sizing: border-box; background: var(--bg-color);">

<div style="margin-bottom: 32px; text-align: center;">
    <div style="font-size: 3rem; color: var(--accent-color); margin-bottom: 16px;"><i class="fas fa-bolt"></i></div>
    <h1 style="font-size: 2.25rem; font-weight: 800; letter-spacing: -1px; margin: 0;">VoltWise</h1>
</div>

<div class="card" style="width:100%; max-width:450px; padding: 40px; border-radius: 20px;">
    <h2 style="margin-bottom: 8px; font-weight: 700;" data-i18n="create_account">Create Account</h2>
    <p style="color: var(--secondary-text); margin-bottom: 32px;" data-i18n="join_us">Start optimizing your energy usage today.</p>

    <form method="POST" action="/register">
        <div style="text-align: left;">
            <label data-i18n="username">Username</label>
            <input type="text" name="username" placeholder="Choose a username" required data-i18n="username_placeholder_reg">
        </div>
        <div style="text-align: left;">
            <label data-i18n="email_label">Email Address</label>
            <input type="email" name="email" placeholder="name@company.com" required data-i18n="email_placeholder_reg">
        </div>
        <div style="text-align: left;">
            <label data-i18n="phone_label">Phone Number</label>
            <input type="text" name="phone" placeholder="+1 (555) 000-0000" required data-i18n="phone_placeholder_reg">
        </div>
        <div style="text-align: left;">
            <label data-i18n="password">Password</label>
            <input type="password" name="password" placeholder="••••••••" required data-i18n="password_placeholder_reg">
        </div>
        <button type="submit" class="submit-btn" style="margin-top: 12px;" data-i18n="create_account">
            Register Account
        </button>
    </form>

    <div style="margin-top: 24px; color: var(--secondary-text); font-size: 0.95rem;">
        <p><span data-i18n="already_have_account">Already have an account?</span> <a href="/" style="color: var(--accent-color); font-weight: 600; text-decoration:none;" data-i18n="login_here">Sign in</a></p>
    </div>
</div>

<div style="margin-top: 40px; color: var(--secondary-text); font-size: 0.85rem;">
    &copy; 2026 VoltWise &bull; Made with <i class="fas fa-heart" style="color: #ef4444;"></i> for the planet
</div>

</body>
</html>
